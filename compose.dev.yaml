services:
  hyperdash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vm21
    restart: unless-stopped
    ports:
      - "5210:3000"
    volumes:
      - ./server:/app/server
      - /app/node_modules
      - /var/snap/lxd/common/lxd:/var/snap/lxd/common/lxd
      - /dev/bus/usb:/dev/bus/usb
    privileged: true
    
    # 4. Use Host Network (Optional, but often easier for USB hotplugging events)
    # network_mode: host 
    
    group_add:
      - "101" # Your LXD Group ID